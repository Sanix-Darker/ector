name: Test and Lint

on:
  push:
    branches:
      - '**'

jobs:
  test-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      run: |
        python -m pip install --upgrade pip
        pip install poetry

    - name: Install dependencies
      run: poetry install --no-interaction

    - name: Install web + test extras
      run: |
        poetry run pip install "fastapi>=0.110" "uvicorn>=0.29" httpx

    - name: Download spaCy language models
      # Models are required at runtime/tests but are not regular PyPI deps.
      run: |
        poetry run python -m spacy download en_core_web_sm
        poetry run python -m spacy download fr_core_news_sm

    - name: Run Ruff linter
      run: poetry run ruff check .

    - name: Run Pytest
      run: poetry run pytest
