# ECTOR web + Caddy reverse proxy (modeled on the caddy-fastapi pattern).
# Usage:
#   cd deploy && docker compose up -d
# Pulls ghcr.io/sanix-darker/ector:latest by default.
# For local image build:
#   ECTOR_IMAGE=ector-web:dev docker compose -f docker-compose.yml -f docker-compose.local.yml up --build -d
services:
  ector-web:
    image: ${ECTOR_IMAGE:-ghcr.io/sanix-darker/ector:latest}
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      WORKERS: "1"
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - ector-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
